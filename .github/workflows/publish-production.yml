name: Publish
on:
  push:
    branches:
      - production

jobs:
  publish:
    if: github.repository == 'cloudflare/cloudflare-docs'
    name: Production
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Restore node_modules (cache hit)
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('package.json') }}

      - name: Install node_modules (cache miss)
        run: npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - name: Restore Astro assets from cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.astro/assets
          key: static

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: site-html
          path: dist

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify Google Chat on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.CED_TEAM_ALERTS_CHANNEL_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ *Publish Production* workflow failed.\nActor: $ACTOR\n<https://github.com/$REPO/actions/runs/$RUN_ID|View run>\"}"
